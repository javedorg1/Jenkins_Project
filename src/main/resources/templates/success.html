<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Javed Technologies - Success</title>
 <link href="css/javed-style.css" rel="stylesheet" type="text/css"/>    
</head>

<body>
    <div class="header">
        Javed Technologies - Contact: +91-963045585
     </div>
    <div class="container">
        <h2>Registration Successful!</h2>
         <p  class="success-message" th:text="'Thank you, ' + ${name} + ', for registering for the ' + ${course} + ' course.'"></p>

                </div>
                <div class="trainer-info">
                    <p><strong>Trainer:</strong> <b>Mr. Javed</b><br />
                        <strong>Contact:</strong> <b>91-9630455585</b><br />
                        <strong>Server IP:</strong> <span th:text="${serverIp}"></span><br />
                        <strong>Client IP:</strong> <span th:text="${clientIp}"></span>
                    </p>
                </div>
            </div>
    </div>
</body>
</html>
